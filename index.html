    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --dark: #050505; --card: #0c0c0c; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); --purple: #bf00ff; --pink: #ff00aa; --orange: #ff6600; }
        body { background: var(--dark); color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; padding-bottom: 20px; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.2), transparent 50%), radial-gradient(circle at 80% 70%, rgba(191, 0, 255, 0.15), transparent 50%), radial-gradient(circle at 50% 100%, rgba(255, 0, 170, 0.1), transparent 40%), radial-gradient(circle at 0% 50%, rgba(255, 102, 0, 0.08), transparent 30%); z-index: -1; pointer-events: none; animation: floatBg 20s ease-in-out infinite; }
        @keyframes floatBg { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-1%, 1%); } 50% { transform: translate(1%, -1%); } 75% { transform: translate(-0.5%, -0.5%); } }
        .font-brand { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 5px rgba(0,242,255,0.3); } 50% { box-shadow: 0 0 25px rgba(0,242,255,0.6), 0 0 10px rgba(191,0,255,0.4); } }
        @keyframes neonPulse { 0%, 100% { border-color: rgba(0,242,255,0.5); box-shadow: 0 0 5px rgba(0,242,255,0.3); } 50% { border-color: rgba(255,102,0,0.8); box-shadow: 0 0 15px rgba(255,102,0,0.5); } }
        .content-card { background: linear-gradient(135deg, rgba(12,12,12,0.95) 0%, rgba(8,8,8,0.98) 100%); border-radius: 24px; overflow: hidden; border: 1px solid rgba(0,242,255,0.2); transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); cursor: pointer; animation: fadeInScale 0.6s ease backwards; position: relative; backdrop-filter: blur(2px); }
        .content-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 0%, rgba(0,242,255,0.05) 50%, rgba(191,0,255,0.05) 100%); opacity: 0; transition: opacity 0.5s ease; z-index: 1; pointer-events: none; }
        .content-card:hover::before { opacity: 1; }
        .content-card:hover { transform: scale(1.05) translateY(-10px); border-color: var(--cyan); box-shadow: 0 25px 45px rgba(0,242,255,0.3), 0 0 25px rgba(191,0,255,0.2); }
        .poster-wrapper { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .content-card:hover .poster-img { transform: scale(1.12); }
        .card-title-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.7) 60%, transparent 100%); padding: 18px 14px 14px 14px; z-index: 5; }
        .card-title-overlay p { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; line-height: 1.2; text-transform: uppercase; letter-spacing: 1px; background: linear-gradient(135deg, #fff, var(--cyan), var(--orange)); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .badge-tag { position: absolute; top: 12px; right: 12px; padding: 4px 14px; border-radius: 30px; font-size: 8px; font-weight: 900; text-transform: uppercase; backdrop-filter: blur(12px); background: linear-gradient(135deg, rgba(0,242,255,0.4), rgba(191,0,255,0.3)); border: 1px solid rgba(0,242,255,0.6); color: white; animation: pulseGlow 2s infinite; z-index: 10; }
        .badge-hot-red { background: linear-gradient(135deg, #ff3333, #cc0000) !important; border: 1px solid #ff8888 !important; color: white !important; }
        .badge-new-green { background: linear-gradient(135deg, #00ff88, #00cc66) !important; border: 1px solid #88ffcc !important; color: #000 !important; }
        
        /* BARRA DE NAVEGACIÓN HORIZONTAL CON SCROLL */
        .categories-bar { margin: 20px 0 30px 0; overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--cyan) rgba(255,255,255,0.1); white-space: nowrap; padding-bottom: 10px; }
        .categories-bar::-webkit-scrollbar { height: 4px; }
        .categories-bar::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .categories-bar::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
        .categories-wrapper { display: inline-flex; gap: 15px; padding: 5px 5px; }
        .category-btn { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,242,255,0.05)); border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; padding: 12px 25px; cursor: pointer; transition: all 0.3s ease; min-width: 100px; backdrop-filter: blur(10px); }
        .category-btn:hover { background: linear-gradient(135deg, rgba(0,242,255,0.2), rgba(191,0,255,0.15)); border-color: var(--cyan); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,242,255,0.2); }
        .category-btn.active { background: linear-gradient(135deg, var(--cyan), var(--purple)); border-color: white; box-shadow: 0 0 20px rgba(0,242,255,0.5); }
        .category-btn.active .category-label { color: #000; }
        .category-icon { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(0,242,255,0.5)); }
        .category-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.8); }
        .category-btn.active .category-label { color: #000; font-weight: 900; }
        
        .btn-action { background: linear-gradient(135deg, #fff 0%, #e8e8e8 100%); color: #000; font-weight: 800; padding: 16px; border-radius: 15px; text-align: center; width: 100%; text-transform: uppercase; transition: all 0.4s ease; }
        .btn-action:hover { transform: scale(1.03); box-shadow: 0 15px 30px rgba(0,242,255,0.4); }
        .btn-variant { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 14px; font-size: 11px; font-weight: 600; text-align: left; display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 8px; transition: all 0.3s ease; }
        .btn-variant:hover { background: linear-gradient(135deg, var(--cyan), #00aacc); color: #000; transform: translateX(8px); }
        .btn-variant.disabled { opacity: 0.5; cursor: not-allowed; }
        .lang-card { background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(0,242,255,0.05)); border: 1px solid rgba(0,242,255,0.2); border-radius: 28px; transition: all 0.5s ease; cursor: pointer; backdrop-filter: blur(12px); overflow: hidden; }
        .lang-card:hover { background: linear-gradient(135deg, rgba(0,242,255,0.25), rgba(191,0,255,0.15)); border-color: var(--cyan); transform: translateY(-8px) scale(1.03); }
        .detail-screen-img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 24px; transition: transform 0.5s ease; }
        .detail-screen-img:hover { transform: scale(1.02); }
        .view-section.hidden { display: none; }
        .search-container { background: linear-gradient(135deg, var(--glass), rgba(0,242,255,0.08)); border: 1px solid rgba(0,242,255,0.3); border-radius: 100px; padding: 12px 24px; transition: all 0.4s; backdrop-filter: blur(10px); margin-bottom: 20px; }
        .search-container:focus-within { border-color: var(--cyan); box-shadow: 0 0 25px rgba(0,242,255,0.4), 0 0 15px rgba(255,102,0,0.3); transform: scale(1.01); }
        .feature-box { background: linear-gradient(135deg, rgba(0,242,255,0.15), rgba(191,0,255,0.08)); border: 2px solid var(--cyan); border-radius: 20px; padding: 14px; margin-top: 12px; font-size: 11px; color: #ccf4ff; backdrop-filter: blur(5px); animation: neonPulse 3s infinite; }
        .update-text { font-size: 10px; color: #00f2ff; margin-top: 8px; text-align: right; }
        .counter-badge { background: linear-gradient(135deg, rgba(0,242,255,0.3), rgba(191,0,255,0.2)); border-radius: 30px; padding: 2px 10px; font-size: 10px; margin-left: 8px; }
        .load-more-btn { background: linear-gradient(135deg, rgba(0,242,255,0.2) 0%, rgba(191,0,255,0.1) 100%); border: 2px solid var(--cyan); border-radius: 50px; padding: 14px 40px; text-align: center; margin: 40px auto; display: inline-block; cursor: pointer; transition: all 0.3s ease; font-weight: 700; animation: neonPulse 2s infinite; }
        .load-more-btn:hover { background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #000; transform: scale(1.05); box-shadow: 0 0 30px rgba(0,242,255,0.5); }
        .lang-flag-icon { font-size: 52px; display: inline-block; transition: transform 0.4s ease; }
        .lang-card:hover .lang-flag-icon { transform: scale(1.15) rotate(8deg); }
        .lang-card-title { font-size: 12px; font-weight: 800; letter-spacing: 2.5px; margin-top: 12px; text-transform: uppercase; background: linear-gradient(135deg, #fff, var(--cyan), var(--orange)); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .glow-text { text-shadow: 0 0 20px rgba(0,242,255,0.6), 0 0 10px rgba(255,102,0,0.4); }
        .season-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .season-btn { background: linear-gradient(135deg, rgba(0,242,255,0.15), rgba(191,0,255,0.08)); border: 1px solid var(--cyan); border-radius: 30px; padding: 8px 18px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; }
        .season-btn:hover { background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #000; transform: scale(1.05); }
        .season-active { background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #000; border-color: white; }
        .gradient-text { background: linear-gradient(135deg, #fff 0%, var(--cyan) 40%, var(--orange) 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .empty-state { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(0,242,255,0.03)); border-radius: 30px; border: 1px dashed rgba(0,242,255,0.4); }
        .empty-state img { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.6; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .gamer-animation { animation: gamerAnim 0.5s ease-in-out; }
        @keyframes gamerAnim { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.3) drop-shadow(0 0 15px var(--cyan)); } 100% { transform: scale(1); filter: brightness(1); } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div id="language-overlay" class="fixed inset-0 z-[10000] bg-[#050505] flex items-center justify-center p-6 transition-all duration-700" style="backdrop-filter: blur(16px);">
        <div class="max-w-3xl w-full text-center" data-aos="zoom-in" data-aos-duration="600">

                <span id="label-no-ask" class="text-[10px] uppercase font-bold tracking-widest text-white/60 group-hover:text-white transition-all"></span>
            </label>
        </div>
    </div>

    <header class="px-6 py-6 flex items-center justify-between sticky top-0 z-[900] bg-dark/40 backdrop-blur-xl border-b border-white/10">

        </div>

            <span id="header-flag" class="text-lg"></span>
        </div>

    <main class="px-6 max-w-7xl mx-auto pb-20">
        <section id="home-view" class="view-section" data-aos="fade-up">

                <svg class="opacity-60" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="catalogSearch" class="bg-transparent border-none outline-none w-full text-sm font-medium text-white/90" placeholder="Buscar..." oninput="render()">
            </div>
            
            <!-- BARRA DE CATEGORÍAS HORIZONTAL CON SCROLL -->
            <div class="categories-bar">
                <div class="categories-wrapper">
                    <div id="cat-all" onclick="switchCategory('all')" class="category-btn active">
                        <svg class="category-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>

                    <div id="cat-games" onclick="switchCategory('games')" class="category-btn">
                        <img class="category-icon" src="https://cdn-icons-png.flaticon.com/512/982/982036.png" alt="Juegos" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2300f2ff%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M21 6H3v12h18V6zm-2 10H5V8h14v8zM9 10H7v4h2v-4zm6 0h-2v4h2v-4z%22/%3E%3C/svg%3E'">
                        <span class="category-label" id="lbl-games">JUEGOS</span>

                        <img class="category-icon" src="https://cdn-icons-png.magnific.com/512/738/738096.png" alt="Cine" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2300f2ff%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M18 3v2h-4V3h4zM8 3v2H4V3h4zm14 6v10c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V9h20zm-2 2H4v8h16v-8z%22/%3E%3C/svg%3E'">

                        <span class="category-label" id="lbl-kdrama">KDRAMAS</span>

    <script>
        function showGamerAnimation() {
            const overlay = document.createElement('div');
            overlay.className = 'gamer-animation';
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '10001';
            overlay.style.background = 'radial-gradient(circle, rgba(0,242,255,0.2) 0%, transparent 70%)';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 500);

        function sortItems(pool) {
            const poppyItem = pool.find(item => item.id === 'p5');
            const newItems = pool.filter(item => item.showNewBadge === true && item.id !== 'p5');
            const otherItems = pool.filter(item => !item.showNewBadge && item.id !== 'p5');
            if (poppyItem) return [poppyItem, ...newItems, ...otherItems];
            return [...newItems, ...otherItems];
        }

        function updateCountersAndLabels() {
            const t = i18n[curLang];
            const gamesCount = games.length;
            const moviesCount = movies.length;
            const allCount = gamesCount + moviesCount;
            document.getElementById('lbl-all').innerHTML = `TODO <span class="counter-badge">${allCount}</span>`;
            document.getElementById('lbl-games').innerHTML = `JUEGOS <span class="counter-badge">${gamesCount}</span>`;
            document.getElementById('lbl-movies').innerHTML = `CINE <span class="counter-badge">${moviesCount}</span>`;
            document.getElementById('lbl-kdrama').innerHTML = `KDRAMAS`;
            document.getElementById('lbl-req').innerHTML = `PETICIONES`;
            document.getElementById('lbl-ai').innerHTML = `AI`;
            document.getElementById('kdrama-empty-text').innerText = t.kdrama_empty || "No hay nada disponible actualmente";
        }

        function updateActiveCategory() {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if (currentCategory === 'all') document.getElementById('cat-all').classList.add('active');
            else if (currentCategory === 'games') document.getElementById('cat-games').classList.add('active');
            else if (currentCategory === 'movies') document.getElementById('cat-movies').classList.add('active');
        }

        function init() {
            const saved = localStorage.getItem('novark_reg');
            if (saved) { curLang = saved; document.getElementById('language-overlay').style.display = 'none'; }
            const grid = document.getElementById('langGrid');
            languages.forEach((l, idx) => {
                const div = document.createElement('div');
                div.className = "lang-card p-6 flex flex-col items-center gap-3";
                div.style.animationDelay = `${idx * 0.1}s`;
                div.innerHTML = `<span class="lang-flag-icon text-5xl">${l.flag}</span><p class="lang-card-title text-white/80">${l.label}</p><p class="text-[8px] text-white/40 uppercase tracking-wider">${l.name}</p>`;
                div.onclick = () => setLang(l.code);
                grid.appendChild(div);
            });
            applyTranslations();
            AOS.init({ duration: 600, once: true, offset: 30 });
            updateCountersAndLabels();
        }

        function setLang(c) {
            curLang = c;
            if (document.getElementById('rememberLang').checked) localStorage.setItem('novark_reg', c);
            const overlay = document.getElementById('language-overlay');
            showGamerAnimation();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 500);
            applyTranslations();
        }

        function applyTranslations() {
            const t = i18n[curLang];
            document.getElementById('catalogSearch').placeholder = t.search;
            document.getElementById('btn-back-text').innerText = t.back;
            document.getElementById('req-view-title').innerText = t.request;
            document.getElementById('req-btn').innerText = t.send;
            document.getElementById('label-no-ask').innerText = t.noAsk;
            document.getElementById('header-flag').innerText = t.flag;
            updateCountersAndLabels();
            render();
        }

        function render() {
            const val = document.getElementById('catalogSearch').value.toLowerCase();
            let pool = currentCategory === 'all' ? [...games, ...movies] : (currentCategory === 'games' ? games : movies);
            if (currentCategory === 'kdrama') {
                document.getElementById('gameGrid').innerHTML = '';
                document.getElementById('loadMoreContainer').classList.add('hidden');
                updateActiveCategory();
                return;
            }
            filteredItems = pool.filter(g => g.title[curLang].toLowerCase().includes(val));
            const sorted = sortItems(filteredItems);
            currentDisplayCount = 30;
            displayItems(sorted);
            updateActiveCategory();
        }

        let currentSeriesItem = null;
        let currentSeasonIndex = 0;

        function displayItems(items) {
            const t = i18n[curLang];
            const itemsToShow = items.slice(0, currentDisplayCount);
            const hasMore = currentDisplayCount < items.length;
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            document.getElementById('loadMoreContainer').classList.remove('hidden');
            
            document.getElementById('gameGrid').innerHTML = itemsToShow.map((g, idx) => `
                <div class="content-card" style="animation-delay: ${idx * 0.03}s" onclick="openItem('${g.id}')">
                    <div class="poster-wrapper">
                        ${g.showNewBadge ? `<div class="badge-tag badge-new-green">${t.new}</div>` : ''}
                        ${g.isMostWanted ? `<div class="badge-tag badge-hot-red">${t.hot}</div>` : ''}
                        <img src="${g.poster}" class="poster-img" loading="lazy">
                        <div class="card-title-overlay">
                            <p class="font-brand text-base leading-tight uppercase">${g.title[curLang] || g.title.en}</p>
                        </div>
                    </div>
                </div>`).join('');
            
            if (hasMore) {
                loadMoreBtn.classList.remove('hidden');
                loadMoreBtn.onclick = () => { currentDisplayCount += 30; displayItems(items); };
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        async function openItem(id) {
            const g = [...games, ...movies].find(x => x.id === id);
            if (!g) return;
            const t = i18n[curLang];
            document.getElementById('detailImg').src = g.screen || g.poster;
            document.getElementById('detailTitle').innerText = g.title[curLang] || g.title.en;
            document.getElementById('detailDesc').innerText = (g.desc && g.desc[curLang]) ? g.desc[curLang] : (g.desc ? g.desc.en : '');
            document.getElementById('reqsContainer').innerHTML = g.reqs ? g.reqs.map(r => `<div class="bg-white/5 px-3 py-1.5 rounded-lg border border-white/5 text-[9px] font-bold text-cyan-400/80 uppercase">${r}</div>`).join('') : '';
            
            const specialDiv = document.getElementById('specialFeatures');
            const updateDiv = document.getElementById('updateInfo');
            const seasonDiv = document.getElementById('seasonSelector');
            
            if (g.specialFeatures) {
                specialDiv.innerHTML = g.specialFeatures.split('\n').map(line => `<div>${line}</div>`).join('');
                specialDiv.classList.remove('hidden');
                updateDiv.innerHTML = g.updateInfo;
                updateDiv.classList.remove('hidden');
            } else {
                specialDiv.classList.add('hidden');
                updateDiv.classList.add('hidden');
            }

            if (g.isSeries && g.seasons) {
                currentSeriesItem = g;
                currentSeasonIndex = 0;
                seasonDiv.innerHTML = g.seasons.map((s, i) => `<button class="season-btn ${i === 0 ? 'season-active' : ''}" onclick="selectSeason(${i})">Temporada ${s.season}</button>`).join('');
                seasonDiv.classList.remove('hidden');
                await loadSeasonContent(0);
            } else {

                let htmlArea = '';
                if (g.multiVersion) {

                                <span>🌎 Español (Latino)</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                            </button>

                            </button>`;
                    } else {
                        htmlArea = `
                            <button onclick="handleDownload('${g.links.mex}', '${g.title[curLang] || g.title.en}', '${g.type}', '${g.poster}', '🌎 Español (Latino)')" class="btn-variant">
                                <span>🌎 Español (Latino)</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                            </button>
                            <button onclick="handleDownload('${g.links.usa}', '${g.title[curLang] || g.title.en}', '${g.type}', '${g.poster}', '🇺🇸 English')" class="btn-variant">
                                <span>🇺🇸 English</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                            </button>`;
                    }
                } else {
                    const actionText = g.type === 'movie' ? t.play : t.download;
                    htmlArea = `<button onclick="handleDownload('${g.link}', '${g.title[curLang] || g.title.en}', '${g.type}', '${g.poster}', '${t.flag}')" class="btn-action">${actionText}</button>`;
                }
                document.getElementById('downloadArea').innerHTML = htmlArea;
            }
            navigate('detail');
        }

        async function loadSeasonContent(seasonIdx) {
            if (!currentSeriesItem || !currentSeriesItem.seasons[seasonIdx]) return;
            const season = currentSeriesItem.seasons[seasonIdx];
            const t = i18n[curLang];
            const htmlArea = `
                <button onclick="handleDownload('${season.links.mex}', '${season.title[curLang] || season.title.en}', 'movie', '${currentSeriesItem.poster}', '🌎 Español (Latino)')" class="btn-variant">
                    <span>🌎 Español (Latino) - ${season.title[curLang] || season.title.en}</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                </button>
                <button onclick="handleDownload('${season.links.usa}', '${season.title[curLang] || season.title.en} (English)', 'movie', '${currentSeriesItem.poster}', '🇺🇸 English')" class="btn-variant">
                    <span>🇺🇸 English - ${season.title[curLang] || season.title.en}</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                </button>`;
            document.getElementById('downloadArea').innerHTML = htmlArea;
            
            const btns = document.querySelectorAll('.season-btn');
            btns.forEach((btn, i) => {
                if (i === seasonIdx) btn.classList.add('season-active');
                else btn.classList.remove('season-active');
            });
        }

        async function selectSeason(seasonIdx) {
            currentSeasonIndex = seasonIdx;
            await loadSeasonContent(seasonIdx);
        }

        async function handleDownload(url, title, type, poster, langLabel) {
            await logDownload(title, type, poster, langLabel);
            window.open(url, '_blank');
        }

        function navigate(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(v + '-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (v === 'home') {
                currentCategory = 'all';
                render();
            }
        }

        function switchCategory(c) {
            currentCategory = c;
            if (c === 'kdrama') {
                navigate('kdrama');
            } else {
                navigate('home');
            }
            render();
        }

        async function sendRequest() {
            const btn = document.getElementById('req-btn');
            const input = document.getElementById('requestInput');
            if (!input.value) return;
            await logRequest(input.value, "https://i.ibb.co/ZRJzrLqr/image.png");
            btn.innerText = "...";
            setTimeout(() => {
                btn.innerText = "ENVIADO ✓";
                btn.classList.add('!bg-cyan-400', '!text-black');
                input.value = "";
                setTimeout(() => { 
                    btn.innerText = i18n[curLang].send; 
                    btn.classList.remove('!bg-cyan-400', '!text-black');
                }, 2000);
            }, 1000);
        }

        function resetLanguage() {
            localStorage.removeItem('novark_reg');
            location.reload();
        }

        window.onload = init;
    </script>
</body>
    </html>
